<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utimak</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="./fontawesome/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <header>
      <img class="logo" src="./Header/logo.jpg" alt="logo">
      <div class="header-seach">
      <input class="search" type="text" placeholder="Busque aqui o que deseja" />
      <i id="pesquisar" class="fa-solid fa-magnifying-glass"></i>
      </div>
      <ul class="nav">
        <li><a href="/"><img class="nav-client" src="./Header/Cart-header.png" alt="Carrinho de Compras"></a></li>
        <li><a href="/"><img class="nav-client" src="./Header/Atendimento-header.png" alt="Atendimento"></a></li>
        <li><a href="/"><img class="nav-client" src="./Header/Perfil-header.png" alt="Login"></a></li>
      </ul>
  </header>

  <main> 
    <div class="welcome">
      <i class="fa-solid fa-gears"></i>
      <p>Seja <br>bem-vindo</p>
      <div class="sombra"></div>
    </div>

    <div class="categoria-itens">
      <p class="name-catalogo">Categoria de itens:</p>
      <nav class="header-navigation">
        <a href="/"><li class="header-list"><p class="CategoriaText">Máquinas</p></li></a>
        <a href="/"><li class="header-list"><p class="CategoriaText">Limpeza</p></li></a>
        <a href="/"><li class="header-list"><p class="CategoriaText">Brinquedos</p></li></a>
        <a href="/"><li class="header-list"><p class="CategoriaText">Festa</p></li></a>
        <a href="/"><li class="header-list"><p class="CategoriaText">Cozinha</p></li></a>
        <a href="/"><li class="header-list"><p class="CategoriaText">Embalagens</p></li></a>
      </nav>
    </div>
  

    <div class="main-top">
      <div class="main-slide">
        <i class="fa-solid fa-circle-chevron-left botoes"  id="button1"></i>
        <div class="slide-images"></div>
        <i class="fa-solid fa-circle-chevron-right botoes" id="button2"></i>
      </div>
    </div>

  </main>

  <script src="./script.js"></script>
</body>
</html>
