<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utimak</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="./fontawesome/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <header>
      <img class="logo" src="./Header/logo.jpg" alt="logo">
      <div class="header-seach">
      <input class="search" type="text" placeholder="Busque aqui o que deseja" />
      <i id="pesquisar" class="fa-solid fa-magnifying-glass"></i>
      </div>
      <ul class="nav">
        <li><a href="/"><img class="nav-client" src="./Header/Cart-header.png" alt="Carrinho de Compras"></a></li>
        <li><a href="/"><img class="nav-client" src="./Header/Atendimento-header.png" alt="Atendimento"></a></li>
        <li><a href="/"><img class="nav-client" src="./Header/Perfil-header.png" alt="Login"></a></li>
      </ul>
  </header>

  <main> 
    <div class="welcome">
      <i class="fa-solid fa-gears"></i>
      <p>Seja <br>bem-vindo</p>
      <div class="sombra"></div>
    </div>

    <div class="categoria-itens">
      <p class="name-catalogo">Categoria de itens:</p>
      <nav class="header-navigation">
        <a href="/"><li class="CategoriaText">Máquinas</li></a>
        <a href="/"><li class="CategoriaText">Limpeza</li></a>
        <a href="/"><li class="CategoriaText">Brinquedos</li></a>
        <a href="/"><li class="CategoriaText">Festa</li></a>
        <a href="/"><li class="CategoriaText">Cozinha</li></a>
        <a href="/"><li class="CategoriaText">Embalagens</li></a>
      </nav>
    </div>
  

    <div class="slide-top">

      <div class="slide-anuncios">
        <div class="anuncios">
          <img src="./Main/Main3/produto1.jpeg">
          <img src="./Main/Main3/produto2.jpeg">
          <img src="./Main/Main3/Anuncios/anuncio3.jpeg">
          <img src="./Main/Main3/Anuncios/anuncio4.jpeg">
          <img src="./Main/Main3/produto1.jpeg">
        </div>
      </div>
      <div class="slide-ofertas">
        <i class="fa-solid fa-chevron-left btn"  id="prev"></i>
        <div class="img-ofertas">
          <img src="./Main/Main3/produto1.jpeg">
          <img src="./Main/Main3/produto2.jpeg">
          <img src="./Main/Main3/produto3.jpeg">
          <img src="./Main/Main3/produto4.jpeg">
          <img src="./Main/Main3/produto5.jpeg">
          <img src="./Main/Main3/produto6.jpeg">
          <img src="./Main/Main3/produto7.jpeg">
        </div> 
        <i class="fa-solid fa-chevron-right btn" id="next"></i>
      </div>

    </div>

  </main>

  <script src="./script.js"></script>
</body>
</html>
